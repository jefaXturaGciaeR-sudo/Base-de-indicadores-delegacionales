// Obtener la meta vigente según el mes actual (para indicadores acumulados)
function getMetaVigente(tab){
  const m=METAS[tab];if(!m) return null;
  const mesIdx=new Date().getMonth(); // 0=ene, 11=dic
  if(m.mensual){
    const mm=m.mensual[mesIdx]||m.mensual[m.mensual.length-1];
    return {esp:mm.esp,medio_inf:mm.medio_inf,medio_sup:mm.medio_sup,dir:m.dir,pond:m.pond,unit:m.unit,name:m.name,nota:m.nota,dinamico:true,mesTxt:['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][mesIdx]};
  }
  if(m.trimestral){
    const triIdx=Math.min(Math.floor(mesIdx/3),3);
    const tt=m.trimestral[triIdx];
    return {esp:tt.esp,medio_inf:tt.medio_inf,medio_sup:tt.medio_sup,dir:m.dir,pond:m.pond,unit:m.unit,name:m.name,nota:m.nota,dinamico:true,mesTxt:'T'+(triIdx+1)};
  }
  return {esp:m.esp,medio_inf:m.medio_inf,medio_sup:m.medio_sup,dir:m.dir,pond:m.pond,unit:m.unit,name:m.name,nota:m.nota,dinamico:false};
}

// Fórmula de proporcionalidad IMSS para calcular ponderación obtenida
function calcPonderacion(tab,val){
  const mv=getMetaVigente(tab);if(!mv||val===null||val===undefined||isNaN(val)) return 0;
  const sem=evalSemaforoReal(mv,val);
  if(sem==='verde') return mv.pond;
  if(sem==='rojo') return 0;
  // Desempeño medio → proporcionalidad
  if(mv.dir==='asc'){
    // Proporcionalidad directa: (pond * val) / esp
    return +(mv.pond*val/mv.esp).toFixed(2);
  } else {
    // Proporcionalidad inversa: (pond * esp) / val
    return val===0?mv.pond:+(mv.pond*mv.esp/val).toFixed(2);
  }
}

// Semáforo con operadores exactos del MMIM
function evalSemaforoReal(mv,val){
  if(!mv||val===null||val===undefined||isNaN(val)) return 'sd';
  if(mv.dir==='asc'){
    // Esperado: >= esp | Medio: > medio_inf a < esp | Bajo: <= medio_inf
    if(val>=mv.esp) return 'verde';
    if(val>mv.medio_inf && val<mv.esp) return 'amarillo';
    return 'rojo';
  } else {
    // Esperado: <= esp | Medio: > esp a <= medio_sup | Bajo: > medio_sup
    if(val<=mv.esp) return 'verde';
    if(val>mv.esp && val<=mv.medio_sup) return 'amarillo';
    return 'rojo';
  }
}

// ═══════════════════════════════════════════════════════════════════
// MATH: Pearson, Regresión Lineal, Proyección
// ═══════════════════════════════════════════════════════════════════
function pearson(x,y){
  const n=Math.min(x.length,y.length);
  if(n<3) return {r:0,n:0};
  const mx=x.slice(0,n).reduce((a,b)=>a+b,0)/n;
  const my=y.slice(0,n).reduce((a,b)=>a+b,0)/n;
  let num=0,dx2=0,dy2=0;
  for(let i=0;i<n;i++){const dx=x[i]-mx,dy=y[i]-my;num+=dx*dy;dx2+=dx*dx;dy2+=dy*dy}
  const den=Math.sqrt(dx2*dy2);
  return {r:den===0?0:num/den, n};
}
function linReg(pts){
  const n=pts.length;
  if(n<2) return {slope:0,intercept:pts[0]?.y||0,r2:0};
  let sx=0,sy=0,sxy=0,sx2=0;
  pts.forEach(({x,y})=>{sx+=x;sy+=y;sxy+=x*y;sx2+=x*x});
  const slope=(n*sxy-sx*sy)/(n*sx2-sx*sx);
  const intercept=(sy-slope*sx)/n;
  const mean=sy/n;
  const ssTot=pts.reduce((s,{y})=>s+(y-mean)**2,0);
  const ssRes=pts.reduce((s,{x,y})=>s+(y-(slope*x+intercept))**2,0);
  const r2=ssTot===0?1:1-ssRes/ssTot;
  return {slope,intercept,r2};
}
function projectNext(pts, ahead=3){
  const {slope,intercept}=linReg(pts);
  const lastX=pts[pts.length-1]?.x||0;
  return Array.from({length:ahead},(_,i)=>({
    x:lastX+i+1,
    y:+(slope*(lastX+i+1)+intercept).toFixed(2)
  }));
}

// FETCH — robusto con reintentos por variantes de nombre de hoja
// ═══════════════════════════════════════════════════════════════════
let fetchLog=[];
async function fetchSheetRaw(sid,tab){
  const url = `https://opensheet.elk.sh/${sid}/${encodeURIComponent(tab)}`;
  
  const r = await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);

  const data = await r.json();

  if(!data || data.length === 0){
    throw new Error('Hoja vacía o no encontrada');
  }

  const cols = Object.keys(data[0]);
  const rows = data.map(row => cols.map(c => row[c]));

  return { cols, rows };
}
async function fetchSheet(sid,tab){
  // Intentar nombre exacto primero, luego variantes comunes
  const variants=[tab];
  // Sin espacio: "DM 01" → "DM01"
  if(tab.includes(' ')) variants.push(tab.replace(/\s+/g,''));
  // Con guión bajo: "DM 01" → "DM_01"
  if(tab.includes(' ')) variants.push(tab.replace(/\s+/g,'_'));
  // Minúsculas
  variants.push(tab.toLowerCase());
  // Sin espacio minúsculas
  if(tab.includes(' ')) variants.push(tab.replace(/\s+/g,'').toLowerCase());
  
  for(const v of variants){
    try{
      const data=await fetchSheetRaw(sid,v);
      if(v!==tab) fetchLog.push({tab,status:'ok',note:'Encontrada como "'+v+'"'});
      else fetchLog.push({tab,status:'ok'});
      return data;
    }catch(e){
      // Solo loguear si es la última variante
      if(v===variants[variants.length-1]){
        fetchLog.push({tab,status:'error',note:e.message});
      }
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════════
// GENERIC PARSER (same logic as v1, preserved)
// ═══════════════════════════════════════════════════════════════════
function parseGeneric(data, tabName){
  if(!data||!data.rows||data.rows.length<13)return null;
  const R=data.rows;
  let name=tabName;
  for(let r=0;r<4;r++){for(let c=0;c<5;c++){
    const v=String(R[r]?.[c]||'').trim();
    if(v.length>15&&(v.includes('-')||v.includes('Cobertura')||v.includes('Porcentaje')||v.includes('Tasa')||v.includes('Promedio')||v.includes('Índice'))){name=v;break}
  };if(name!==tabName)break}
  let hdrRow=-1;
  for(let r=8;r<22;r++){
    if(!R[r])continue;
    for(let c=0;c<6;c++){
      const v=String(R[r]?.[c]||'').trim().toLowerCase();
      if(v==='clave presupuestal'||v==='unidad'){hdrRow=r;break}
    };if(hdrRow>=0)break;
  }
  if(hdrRow<0)hdrRow=11;
  const hdr=R[hdrRow]||[];
  let lastDataCol=-1;
  for(let c=hdr.length-1;c>=2;c--){
    for(let r=hdrRow+2;r<Math.min(hdrRow+8,R.length);r++){
      const v=R[r]?.[c];
      if(v!==null&&typeof v==='number'&&v!==0){lastDataCol=c;break}
    };if(lastDataCol>=0)break;
  }
  if(lastDataCol<0)lastDataCol=4;
  const umfs=[];let ooad=null;
  for(let r=hdrRow+1;r<R.length;r++){
    const row=R[r];if(!row)continue;
    const c0=String(row[0]||'').trim();
    const c1=String(row[1]||'').trim();
    if(!c0&&!c1)continue;
    const nm=c1||c0;
    if(nm.length<3)continue;
    const val=typeof row[lastDataCol]==='number'?Math.round(row[lastDataCol]*100)/100:null;
    const hist={};
    for(let c=2;c<=8;c++){
      const yr=R[hdrRow]?.[c];const v=row[c];
      if(yr&&typeof v==='number'){
        const yrNum=typeof yr==='number'?yr:parseInt(String(yr));
        if(yrNum>=2018&&yrNum<=2025)hist[yrNum]=Math.round(v*100)/100;
      }
    }
    const monthly={};
    const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    for(let c=2;c<hdr.length;c++){
      const h=String(hdr[c]||'').trim();
      const mo=months.find(m=>h.toLowerCase().includes(m.toLowerCase()));
      if(mo&&typeof row[c]==='number'){if(!monthly[mo])monthly[mo]=Math.round(row[c]*100)/100}
    }
    const entry={nombre:nm,clave:c0,val,hist,monthly};
    if(nm.toLowerCase().includes('ooad')||nm.toLowerCase().includes('poniente')||nm.toLowerCase().includes('méxico poniente')||c0==='16')
      ooad=entry;
    else if(nm.match(/^(UMF|HGZ|HGR|UMFH|HGO)/i)||/^\d{12}$/.test(c0)||(nm.length>4&&!nm.toLowerCase().includes('total')&&!nm.toLowerCase().includes('nacional')))
      umfs.push(entry);
  }
  return{name,tab:tabName,ooad,umfs,val_col:lastDataCol};
}

        errHtml+='3. En "Acceso general" → cambiar a <b>"Cualquier persona con el enlace"</b><br>';
        errHtml+='4. Verificar que diga <b>"Lector"</b> (no Editor)<br>';
        errHtml+='5. Clic en <b>"Listo"</b><br>';
        errHtml+='6. <b>Repetir</b> para el Tablero MMIM<br>';
        errHtml+='7. Regresar aquí → clic en <b>"↻ Actualizar"</b><br>';
      } else {
        errHtml+='Posibles causas:<br>• IDs de Sheet incorrectos<br>• Hojas con nombres diferentes a los esperados<br>• Problema temporal de Google<br>';
        const errs=fetchLog.filter(l=>l.status==='error').slice(0,5);
        if(errs.length>0){
          errHtml+='<br><b>Errores detectados:</b><br>';
          errs.forEach(l=>{errHtml+='• '+l.tab+': '+l.note+'<br>'});
        }
      }
      throw new Error(errHtml);
    }
    S.loaded=true;S.lastUpdate=new Date();si=Object.keys(S.data)[0];
    document.getElementById('sDot').classList.remove('off');
    const failMsg=failedTabs.length>0?' ('+failedTabs.length+' no encontradas)':'';
    document.getElementById('sTxt').textContent=ok+' indicadores'+failMsg+' · '+new Date().toLocaleTimeString('es-MX');
    cv='dashboard';
  }catch(e){
    S.error=e.message;
    document.getElementById('sDot').classList.add('off');
    document.getElementById('sTxt').textContent='Error';
  }
  S.loading=false;render();
}

const VW=[{id:'dashboard',l:'Dashboard'},{id:'semaforo',l:'Semáforo'},{id:'tendencias',l:'Tendencias'},{id:'proyecciones',l:'Proyecciones'},{id:'correlacion',l:'Correlación'},{id:'conexiones',l:'Conexiones'},{id:'email',l:'Email'},{id:'config',l:'⚙'}];

function init(){
  const nv=document.getElementById('nav');
  VW.forEach(v=>{const b=document.createElement('button');b.textContent=v.l;b.onclick=()=>{cv=v.id;render()};b.dataset.v=v.id;nv.appendChild(b)});
  const cfg=gc();if(cfg.sheetEval)loadAllData();else render();
}
function render(){
  document.querySelectorAll('.nv button').forEach(b=>b.classList.toggle('a',b.dataset.v===cv));
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};
  const app=document.getElementById('app');
  if(cv==='config'){app.innerHTML=rConfig();return}
  if(S.loading){
    const pct=S.total>0?Math.round(S.progress/S.total*100):0;
    app.innerHTML='<div class="ld"><div class="sp"></div>Conectando con Google Sheets...<div class="pbar"><div class="fill" style="width:'+pct+'%"></div></div><div style="font-size:11px;margin-top:4px">'+S.progress+'/'+S.total+' hojas</div></div>';
    return;
  }
  if(S.error){app.innerHTML='<div class="ld"><div style="white-space:pre-wrap;text-align:left;max-width:600px;margin:0 auto;font-size:12px">'+S.error+'</div><br><button class="btn" onclick="cv=\'config\';render()">Ver diagnóstico</button></div>';return}
  if(!S.loaded){app.innerHTML='<div class="ld"><button class="btn" onclick="cv=\'config\';render()">Configurar Google Sheets</button></div>';return}
  switch(cv){
    case'dashboard':app.innerHTML=rDash();break;
    case'semaforo':app.innerHTML=rSem();break;
    case'tendencias':app.innerHTML=rTrend();setTimeout(dTrend,80);break;
    case'proyecciones':app.innerHTML=rProj();setTimeout(dProj,80);break;
    case'correlacion':app.innerHTML=rCorr();setTimeout(dCorr,80);break;
    case'conexiones':app.innerHTML=rConex();break;
    case'email':app.innerHTML=rEmail();break;
  }
}

function ks(){return Object.keys(S.data)}
function nm(v,d){d=d||2;return v!==null&&v!==undefined&&!isNaN(v)?Number(v).toFixed(d):'-'}
function getProc(k){return S.data[k]?.proc||''}
function groupedOpts(){
  let o='';
  PROC.forEach(p=>{
    const inds=ks().filter(k=>getProc(k)===p.id);
    if(!inds.length)return;
    o+='<optgroup label="'+p.name+' ('+inds.length+')">';
    inds.forEach(k=>{o+='<option value="'+k+'"'+(k===si?' selected':'')+'>'+k+(METAS[k]?' — '+METAS[k].name:'')+'</option>'});
    o+='</optgroup>';
  });
  return o;
}

// DASHBOARD — ahora con semáforo real y resumen ejecutivo
// ═══════════════════════════════════════════════════════════════════
function rDash(){
  let tV=0,tA=0,tR=0,tSD=0,alerts=[];
  ks().forEach(k=>{
    const d=S.data[k];const oVal=d.ooad?d.ooad.val:null;
    const sem=evalSemaforo(k,oVal);
    if(sem==='verde')tV++;else if(sem==='amarillo'){tA++;alerts.push({k,val:oVal,sem,tipo:'ooad'})}
    else if(sem==='rojo'){tR++;alerts.push({k,val:oVal,sem,tipo:'ooad'})}
    else tSD++;
  });
  const total=ks().length;
  let h='<div class="g g4">';
  h+='<div class="mc"><div class="lb">Indicadores</div><div class="vl">'+total+'</div><div class="sm">cargados de ~58 MMIM<span class="tg">LIVE</span></div></div>';
  h+='<div class="mc"><div class="lb">Desempeño esperado</div><div class="vl gr">'+tV+'</div><div class="sm">'+(total>0?Math.round(tV/total*100):0)+'% en meta</div></div>';
  h+='<div class="mc"><div class="lb">Desempeño medio</div><div class="vl yl">'+tA+'</div><div class="sm">Requieren vigilancia</div></div>';
  h+='<div class="mc"><div class="lb">Desempeño bajo</div><div class="vl rd">'+tR+'</div><div class="sm">Acción correctiva urgente</div></div>';
  h+='</div>';

  // Tabla por proceso con semáforo REAL
  h+='<div class="cd"><div class="ct">Situación por proceso MMIM (con metas oficiales)</div><div class="tw"><table><thead><tr><th>Proceso</th><th>Indicador</th><th>OOAD</th><th>Meta</th><th>Estado</th><th>Pond.</th></tr></thead><tbody>';
  PROC.forEach(p=>{
    const inds=ks().filter(k=>getProc(k)===p.id);
    if(!inds.length)return;
    h+='<tr><td colspan="6" class="proc-hdr" style="border-color:'+p.color+'">'+p.name+' ('+inds.length+')</td></tr>';
    inds.forEach(k=>{
      const d=S.data[k];const m=getMetaVigente(k);
      const oVal=d.ooad?d.ooad.val:null;
      const sem=evalSemaforo(k,oVal);
      const metaStr=m?(m.dir==='asc'?'≥':'≤')+' '+m.esp+(m.dinamico?' ('+m.mesTxt+')':''):'—';
      const pondObt=calcPonderacion(k,oVal);
      h+='<tr><td></td><td><b>'+k+'</b>'+(m?' <span style="font-size:9px;color:var(--muted)">'+m.name+'</span>':'')+'</td>';
      h+='<td><b>'+nm(oVal)+'</b></td><td style="font-size:10px">'+metaStr+'</td>';
      h+='<td>'+semPill(sem)+'</td><td style="font-size:10px">'+(m?nm(pondObt,1)+'/'+m.pond:'—')+'</td></tr>';
    });
  });
  h+='</tbody></table></div></div>';

  // Alertas priorizadas
  if(alerts.length>0){
    const rojos=alerts.filter(a=>a.sem==='rojo');
    const amarillos=alerts.filter(a=>a.sem==='amarillo');
    h+='<div class="cd"><div class="ct">Alertas priorizadas ('+alerts.length+' indicadores fuera de meta)</div>';
    rojos.forEach(a=>{
      const m=METAS[a.k];
      h+='<div class="al ar"><b>'+a.k+'</b> — OOAD: '+nm(a.val)+' | Meta: '+(m?(m.dir==='asc'?'≥':'≤')+' '+m.esp:'?')+' | <b>DESEMPEÑO BAJO</b></div>';
    });
    amarillos.forEach(a=>{
      const m=METAS[a.k];
      h+='<div class="al ay"><b>'+a.k+'</b> — OOAD: '+nm(a.val)+' | Meta: '+(m?(m.dir==='asc'?'≥':'≤')+' '+m.esp:'?')+' | Desempeño medio</div>';
    });
    h+='</div>';
  }
  return h;
}

// SEMÁFORO — por UMF con metas reales
// ═══════════════════════════════════════════════════════════════════
function rSem(){
  const d=S.data[si];if(!d)return'<div class="ld">Sin datos</div>';
  const m=getMetaVigente(si);
  let h='<div class="fl"><label>Indicador:</label><select onchange="si=this.value;su=\'all\';render()">'+groupedOpts()+'</select>';
  h+='<label>UMF:</label><select onchange="su=this.value;render()"><option value="all">Todas ('+d.umfs.length+')</option>';
  d.umfs.forEach(u=>{h+='<option value="'+u.nombre+'"'+(u.nombre===su?' selected':'')+'>'+u.nombre+'</option>'});
  h+='</select></div>';

  // Meta info card
  if(m){
    h+='<div class="cd" style="padding:10px 14px"><div style="display:flex;gap:16px;flex-wrap:wrap;font-size:11px">';
    h+='<div><b>Meta:</b> '+(m.dir==='asc'?'≥':'≤')+' '+m.esp+' '+m.unit+(m.dinamico?' <span class="tg2">'+m.mesTxt+'</span>':'')+'</div>';
    h+='<div><b>Medio:</b> '+(m.dir==='asc'?'> '+m.medio_inf+' a < '+m.esp:' > '+m.esp+' a ≤ '+m.medio_sup)+'</div>';
    h+='<div><b>Ponderación:</b> '+m.pond+' pts</div>';
    h+='<div><b>Dirección:</b> '+(m.dir==='asc'?'Ascendente (mayor es mejor)':'Descendente (menor es mejor)')+'</div>';
    if(m.nota) h+='<div style="color:var(--yellow)"><b>Nota:</b> '+m.nota+'</div>';
    h+='</div></div>';
  }

  h+='<div class="cd"><div class="ct">'+d.name+'</div><div class="tw"><table><thead><tr><th>Clave</th><th>UMF</th>';
  const sampleU=d.umfs[0];
  const histKeys=sampleU?Object.keys(sampleU.hist||{}).sort():[];
  const moKeys=sampleU?Object.keys(sampleU.monthly||{}):[];
  if(histKeys.length>0)histKeys.slice(-4).forEach(y=>{h+='<th>'+y+'</th>'});
  if(moKeys.length>0)moKeys.slice(0,4).forEach(m=>{h+='<th>'+m.substring(0,3)+'</th>'});
  h+='<th>Último</th><th>Estado</th></tr></thead><tbody>';

  const umfs=su==='all'?d.umfs:d.umfs.filter(u=>u.nombre===su);
  umfs.forEach(u=>{
    const sem=evalSemaforo(si,u.val);
    h+='<tr><td style="font-size:9px;color:var(--muted)">'+u.clave+'</td><td><b>'+u.nombre+'</b></td>';
    if(histKeys.length>0)histKeys.slice(-4).forEach(y=>{h+='<td>'+nm(u.hist[y])+'</td>'});
    if(moKeys.length>0)moKeys.slice(0,4).forEach(m=>{h+='<td>'+nm(u.monthly?.[m])+'</td>'});
    h+='<td><b>'+nm(u.val)+'</b></td><td>'+semPill(sem)+'</td></tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

// ═══════════════════════════════════════════════════════════════════
// PROYECCIONES — ahora con regresión lineal real y alerta de riesgo
// ═══════════════════════════════════════════════════════════════════
function rProj(){
  let h='<div class="fl"><label>Indicador:</label><select onchange="si=this.value;render()">'+groupedOpts()+'</select></div>';
  const d=S.data[si];if(!d)return h;
  const m=getMetaVigente(si);
  const ooad=d.ooad;
  const histKeys=ooad?Object.keys(ooad.hist||{}).sort():[];
  const moKeys=ooad?Object.keys(ooad.monthly||{}):[];

  // Try monthly first, then historical
  let pts=[];let labels=[];let projLabels=[];
  if(moKeys.length>=3){
    pts=moKeys.map((k,i)=>({x:i,y:ooad.monthly[k]}));
    labels=moKeys;
    projLabels=['Mes +1','Mes +2','Mes +3'];
  } else if(histKeys.length>=2){
    pts=histKeys.map((y,i)=>({x:i,y:ooad.hist[y]}));
    labels=histKeys;
    projLabels=['2025 (proy)','2026 (proy)','2027 (proy)'];
  }

  if(pts.length>=2){
    const proj=projectNext(pts,3);
    const {slope,r2}=linReg(pts);
    const projVals=proj.map(p=>p.y);
    const allLabels=[...labels,...projLabels];
    const allVals=[...pts.map(p=>p.y),...projVals.map(()=>null)];
    const allProj=[...pts.map(()=>null),...projVals];

    // Risk assessment
    let riskLevel='ok',riskMsg='Tendencia dentro de lo esperado.';
    if(m){
      const lastProj=projVals[projVals.length-1];
      if(m.dir==='asc'&&lastProj<m.medio_inf){riskLevel='high';riskMsg='RIESGO: La proyección ('+nm(lastProj)+') queda por debajo del desempeño medio ('+m.medio_inf+'). Se requiere intervención inmediata.'}
      else if(m.dir==='asc'&&lastProj<m.esp){riskLevel='med';riskMsg='ALERTA: La proyección ('+nm(lastProj)+') no alcanza la meta ('+m.esp+'). Vigilar tendencia.'}
      else if(m.dir==='desc'&&lastProj>m.medio_sup){riskLevel='high';riskMsg='RIESGO: La proyección ('+nm(lastProj)+') excede el umbral de desempeño medio ('+m.medio_sup+'). Se requiere intervención.'}
      else if(m.dir==='desc'&&lastProj>m.esp){riskLevel='med';riskMsg='ALERTA: La proyección ('+nm(lastProj)+') no cumple meta ('+m.esp+'). Vigilar tendencia.'}
    }

    h+='<div class="cd"><div class="ct">Proyección OOAD — '+si+' <span class="tg2">R²='+nm(r2)+'</span></div>';
    h+='<div class="cw"><canvas id="cp"></canvas></div></div>';
    h+='<div class="'+({high:'risk-high',med:'risk-med',ok:'risk-ok'}[riskLevel])+'"><b>'+(riskLevel==='high'?'⚠ ':'')+(riskLevel==='med'?'△ ':'✓ ')+riskMsg+'</b>';
    h+='<br><span style="font-size:10px;color:var(--muted)">Pendiente: '+(slope>0?'+':'')+nm(slope,3)+' por período | R²='+nm(r2)+' | Basado en '+pts.length+' puntos</span></div>';
  } else {
    h+='<div class="ld">Datos insuficientes para proyección (se necesitan al menos 2 períodos)</div>';
  }

  // Ranking
  h+='<div class="cd"><div class="ct">Ranking UMFs — '+si+'</div><div class="tw"><table><thead><tr><th>#</th><th>UMF</th><th>Valor</th><th>Meta</th><th>Estado</th></tr></thead><tbody>';
  const sorted=[...d.umfs].filter(u=>u.val!==null).sort((a,b)=>{
    if(m&&m.dir==='desc') return a.val-b.val;
    return b.val-a.val;
  });
  sorted.forEach((u,i)=>{
    const sem=evalSemaforo(si,u.val);
    h+='<tr><td>'+(i+1)+'</td><td><b>'+u.nombre+'</b></td><td>'+nm(u.val)+'</td>';
    h+='<td style="font-size:10px">'+(m?(m.dir==='asc'?'≥':'≤')+' '+m.esp:'—')+'</td>';
    h+='<td>'+semPill(sem)+'</td></tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}
function dProj(){
  const d=S.data[si];if(!d)return;
  const ooad=d.ooad;if(!ooad)return;
  const moKeys=Object.keys(ooad.monthly||{});
  const histKeys=Object.keys(ooad.hist||{}).sort();
  let pts=[],labels=[],projLabels=[];
  if(moKeys.length>=3){
    pts=moKeys.map((k,i)=>({x:i,y:ooad.monthly[k]}));labels=moKeys;projLabels=['Mes +1','Mes +2','Mes +3'];
  }else if(histKeys.length>=2){
    pts=histKeys.map((y,i)=>({x:i,y:ooad.hist[y]}));labels=histKeys;projLabels=['Proy 1','Proy 2','Proy 3'];
  }
  if(pts.length<2)return;
  const proj=projectNext(pts,3);
  const m=METAS[si];
  const allLabels=[...labels,...projLabels];
  const ds=[
    {label:'Real',data:[...pts.map(p=>p.y),...proj.map(()=>null)],borderColor:'#006341',backgroundColor:'rgba(0,99,65,.1)',fill:true,tension:.3,pointRadius:4,borderWidth:2},
    {label:'Proyección',data:[...pts.map(()=>null),...proj.map(p=>p.y)],borderColor:'#d4a017',borderDash:[5,3],backgroundColor:'rgba(212,160,23,.1)',fill:true,tension:.3,pointRadius:4,borderWidth:2}
  ];
  if(m) ds.push({label:'Meta ('+m.esp+')',data:Array(allLabels.length).fill(m.esp),borderColor:'#ef4444',borderDash:[6,3],pointRadius:0,borderWidth:2,backgroundColor:'transparent'});
  const el=document.getElementById('cp');if(!el)return;
  charts.cp=new Chart(el,{type:'line',data:{labels:allLabels,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:8,font:{size:9}}}},scales:{x:{grid:{display:false}},y:{beginAtZero:false}}}});
}

// ═══════════════════════════════════════════════════════════════════
// CORRELACIÓN — con Pearson y interpretación
// ═══════════════════════════════════════════════════════════════════
function rCorr(){
  let h='<div class="cd"><div class="ct">Correlación entre indicadores (Pearson)</div>';
  h+='<div class="fl"><label>X:</label><select id="cx">'+groupedOpts()+'</select>';
  h+='<label>Y:</label><select id="cy">'+groupedOpts().replace('selected','')+'</select>';
  h+='<button class="btn" onclick="dCorr()">Calcular</button></div>';
  h+='<div id="corrResult"></div>';
  h+='<div class="cw"><canvas id="cc"></canvas></div></div>';

  // Correlaciones conocidas
  h+='<div class="cd"><div class="ct">Correlaciones epidemiológicas conocidas (MMIM)</div>';
  h+='<div class="tw"><table><thead><tr><th>Indicador A</th><th>→</th><th>Indicador B</th><th>Tipo</th><th>Relación</th></tr></thead><tbody>';

    h+='<td><span class="corr-box '+(c.tipo==='directa'?'corr-pos':'corr-neg')+'">'+c.tipo+'</span></td>';

function dCorr(){
  const xK=document.getElementById('cx')?.value||ks()[0];
  const yK=document.getElementById('cy')?.value||ks()[1];
  const xD=S.data[xK],yD=S.data[yK];if(!xD||!yD)return;
  const pts=[];const xVals=[],yVals=[];
  xD.umfs.forEach(xu=>{
    const yu=yD.umfs.find(y=>y.nombre===xu.nombre||y.clave===xu.clave);
    if(yu&&xu.val!==null&&yu.val!==null&&xu.val!==0&&yu.val!==0){
      pts.push({x:xu.val,y:yu.val,label:xu.nombre});
      xVals.push(xu.val);yVals.push(yu.val);
    }
  });
  // Calculate Pearson
  const {r,n}=pearson(xVals,yVals);
  const absR=Math.abs(r);
  let strength='',cls='corr-neutral';
  if(absR>=0.7){strength='Fuerte';cls=r>0?'corr-pos':'corr-neg'}
  else if(absR>=0.4){strength='Moderada';cls=r>0?'corr-pos':'corr-neg'}
  else if(absR>=0.2){strength='Débil';cls='corr-neutral'}
  else{strength='Sin correlación';cls='corr-neutral'}
  const dir=r>0?'positiva (directa)':'negativa (inversa)';

  const resEl=document.getElementById('corrResult');
  if(resEl){
    let rh='<div style="padding:8px;background:#f8f7f3;border-radius:6px;margin-bottom:10px;font-size:11px">';
    rh+='<b>r = <span class="corr-box '+cls+'">'+r.toFixed(3)+'</span></b> (n='+n+' UMFs) — ';
    rh+='Correlación <b>'+strength+' '+dir+'</b>';
    // Check known correlations
    const known=CORR_CONOCIDAS.find(c=>(c.from===xK&&c.to===yK)||(c.from===yK&&c.to===xK));
    if(known) rh+='<br><span style="color:var(--accent)">Relación MMIM: '+known.desc+'</span>';
    rh+='</div>';
    resEl.innerHTML=rh;
  }

  if(charts.cc)charts.cc.destroy();
  charts.cc=new Chart(document.getElementById('cc'),{type:'scatter',data:{datasets:[{data:pts,backgroundColor:'rgba(0,99,65,.6)',pointRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw.label+': ('+nm(c.raw.x)+', '+nm(c.raw.y)+')'}}},scales:{x:{title:{display:true,text:xK}},y:{title:{display:true,text:yK}}}}});
}

function rConex(){
  let h='<div class="cd"><div class="ct">Análisis de conexiones: ¿Qué afecta este indicador?</div>';
  h+='<div class="fl"><label>Indicador:</label><select id="conInd" onchange="updateConex()">'+groupedOpts()+'</select></div>';

function updateConex(){
  const ind=document.getElementById('conInd')?.value;
  if(!ind)return;
  const el=document.getElementById('conexResult');if(!el)return;
  const d=S.data[ind];if(!d){el.innerHTML='Sin datos';return}
  const m=METAS[ind];
  const oVal=d.ooad?d.ooad.val:null;
  const sem=evalSemaforo(ind,oVal);

  let h='<div style="margin-bottom:12px;padding:10px;background:#f8f7f3;border-radius:8px">';
  h+='<b>'+ind+'</b>'+(m?' — '+m.name:'')+' | OOAD: <b>'+nm(oVal)+'</b> | '+semPill(sem);
  h+='</div>';

  // Find all connections
  const afecta=CORR_CONOCIDAS.filter(c=>c.from===ind);
  const afectado=CORR_CONOCIDAS.filter(c=>c.to===ind);

  if(afecta.length>0){
    h+='<div style="margin-bottom:10px"><b style="font-size:11px">Este indicador AFECTA a:</b></div>';
    afecta.forEach(c=>{
      const target=S.data[c.to];
      const tVal=target?.ooad?.val;
      const tSem=evalSemaforo(c.to,tVal);
      h+='<div class="al '+(c.tipo==='directa'?'ag':'ay')+'">';
      h+='<b>'+c.to+'</b> ('+nm(tVal)+') '+semPill(tSem)+' — '+c.desc;
      h+='<br><span style="font-size:10px;color:var(--muted)">Correlación '+c.tipo+': si '+ind+' '+(c.tipo==='directa'?'sube, este sube':'sube, este baja')+'</span>';
      h+='</div>';
    });
  }
  if(afectado.length>0){
    h+='<div style="margin-bottom:10px;margin-top:14px"><b style="font-size:11px">Este indicador ES AFECTADO por:</b></div>';
    afectado.forEach(c=>{
      const source=S.data[c.from];
      const sVal=source?.ooad?.val;
      const sSem=evalSemaforo(c.from,sVal);
      h+='<div class="al '+(c.tipo==='directa'?'ag':'ay')+'">';
      h+='<b>'+c.from+'</b> ('+nm(sVal)+') '+semPill(sSem)+' — '+c.desc;
      h+='</div>';
    });
  }
  if(afecta.length===0&&afectado.length===0){
    h+='<div class="al" style="border-color:var(--muted);background:#f8f7f3">No se han definido conexiones conocidas para este indicador en el modelo epidemiológico.</div>';
  }
  el.innerHTML=h;
}

function getAllUmfNames(){
  const names=new Set();
  ks().forEach(k=>S.data[k].umfs.forEach(u=>names.add(u.nombre)));
  return [...names].sort();
}
function getUmfFicha(umfName){
  const ficha={nombre:umfName,clave:'',indicadores:[],rojos:0,amarillos:0,verdes:0,sd:0,totalPond:0,pondLograda:0};
  ks().forEach(k=>{
    const d=S.data[k];
    const u=d.umfs.find(u=>u.nombre===umfName);
    if(!u) return;
    if(!ficha.clave&&u.clave) ficha.clave=u.clave;
    const mv=getMetaVigente(k);
    const sem=evalSemaforo(k,u.val);
    const pond=mv?mv.pond:1;
    const pondObtenida=calcPonderacion(k,u.val);
    ficha.totalPond+=pond;
    ficha.pondLograda+=pondObtenida;
    if(sem==='verde') ficha.verdes++;
    else if(sem==='amarillo') ficha.amarillos++;
    else if(sem==='rojo') ficha.rojos++;
    else ficha.sd++;
    ficha.indicadores.push({
      tab:k, val:u.val, sem, meta:mv, proc:getProc(k),
      hist:u.hist, monthly:u.monthly
    });
  });
  ficha.pctDesempeno=ficha.totalPond>0?Math.round(ficha.pondLograda/ficha.totalPond*100):0;
  return ficha;
}

    email+='   2. Informar estrategias implementadas en la siguiente sesión de seguimiento.\n';
  } else {
    email+='   Se reconoce el desempeño de su unidad. Se solicita mantener las acciones que han permitido alcanzar las metas.\n';
  }
  email+='\nSin otro particular, quedo a sus órdenes.\n\n';
  email+='Atentamente,\nCoordinación de Información y Análisis Estratégico\nOOAD México Poniente\nInstituto Mexicano del Seguro Social';

  h+='<div class="cd"><div class="ct">Email personalizado — '+umfName+'</div>';
  h+='<div class="eb" id="em">'+email+'</div>';
  h+='<div style="margin-top:10px;display:flex;gap:8px">';
  h+='<button class="btn" onclick="copyEmail()">Copiar al portapapeles</button>';
  h+='</div></div>';
  return h;
}

function copyEmail(){navigator.clipboard.writeText(document.getElementById('em').innerText).then(()=>alert('Copiado al portapapeles'))}

init();
</script>
</body>
</html>
